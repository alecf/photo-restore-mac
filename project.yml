name: PhotoRestore

options:
  bundleIdPrefix: com.alecf
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

packages:
  RestoreEngine:
    path: RestoreEngine

targets:
  PhotoRestore:
    type: application
    platform: macOS
    sources:
      - path: PhotoRestore
    dependencies:
      - package: RestoreEngine
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.alecf.PhotoRestore
        PRODUCT_NAME: Photo Restore
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.photography"
        INFOPLIST_KEY_NSHumanReadableCopyright: "MIT-licensed. © Alec Flett."
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: YES
        DEAD_CODE_STRIPPING: YES
        ENABLE_PREVIEWS: YES
        SWIFT_VERSION: "5.0"
        DEVELOPMENT_ASSET_PATHS: '"PhotoRestore/Preview Content"'
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
