name: PhotoRestore

options:
  bundleIdPrefix: com.alecf
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

packages:
  RestoreEngine:
    path: RestoreEngine
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

targets:
  PhotoRestore:
    type: application
    platform: macOS
    sources:
      - path: PhotoRestore
    dependencies:
      - package: RestoreEngine
      - package: Sparkle
    info:
      path: PhotoRestore/Info.plist
      properties:
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSMinimumSystemVersion: "14.0"
        LSApplicationCategoryType: public.app-category.photography
        NSHumanReadableCopyright: "MIT-licensed. © 2026 Alec Flett."
        NSHighResolutionCapable: true
        # Sparkle auto-update. SUPublicEDKey is set by the one-time key setup
        # (see docs/sparkle-setup.md); the placeholder is replaced with your real key.
        SUFeedURL: https://alecf.github.io/photo-restore-mac/appcast.xml
        SUPublicEDKey: y/YDrXDVB4arxJCD1YLIpLQqOclDs8vLkHlYVkOzTlA=
        SUEnableAutomaticChecks: true
        SUScheduledCheckInterval: 86400
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.alecf.PhotoRestore
        PRODUCT_NAME: Photo Restore
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: YES
        DEAD_CODE_STRIPPING: YES
        ENABLE_PREVIEWS: YES
        SWIFT_VERSION: "5.0"
        DEVELOPMENT_ASSET_PATHS: '"PhotoRestore/Preview Content"'
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
