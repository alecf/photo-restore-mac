name: Release

# Manual: bumps version from conventional commits (git-cliff), builds an ad-hoc-signed
# DMG, signs it for Sparkle, cuts a GitHub Release, and publishes the appcast.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install tools
        run: brew install xcodegen git-cliff

      - name: Calculate version + changelog
        id: ver
        run: |
          VERSION=$(git-cliff --bumped-version 2>/dev/null)
          VERSION="${VERSION#v}"
          if [ -z "$VERSION" ]; then echo "::error::git-cliff could not calculate a version"; exit 1; fi
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "TAG=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Releasing ${VERSION}"
          CHANGELOG=$(git-cliff --latest --strip header 2>/dev/null)
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          { echo "CHANGELOG<<${EOF}"; echo "${CHANGELOG}"; echo "${EOF}"; } >> "$GITHUB_OUTPUT"

      - name: Verify Sparkle key is configured
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          if [ -z "$SPARKLE_PRIVATE_KEY" ]; then
            echo "::error::Missing SPARKLE_PRIVATE_KEY secret — see docs/sparkle-setup.md"; exit 1
          fi

      - name: Generate project
        run: xcodegen generate

      - name: Run engine tests
        run: cd RestoreEngine && swift test

      - name: Build Release (ad-hoc signed)
        run: |
          xcodebuild -project PhotoRestore.xcodeproj -scheme PhotoRestore \
            -configuration Release -derivedDataPath build/dd -destination 'platform=macOS' \
            MARKETING_VERSION=${{ steps.ver.outputs.VERSION }} \
            CURRENT_PROJECT_VERSION=${{ steps.ver.outputs.VERSION }} \
            CODE_SIGN_IDENTITY="-" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO build

      - name: Deep ad-hoc sign (incl. Sparkle framework)
        run: |
          APP="build/dd/Build/Products/Release/Photo Restore.app"
          codesign --force --deep --sign - --timestamp=none "$APP"
          codesign --verify --deep --verbose "$APP" || true

      - name: Create DMG
        run: |
          V="${{ steps.ver.outputs.VERSION }}"
          mkdir -p dmg
          cp -R "build/dd/Build/Products/Release/Photo Restore.app" dmg/
          ln -s /Applications dmg/Applications
          hdiutil create -volname "Photo Restore" -srcfolder dmg -ov -format UDZO "PhotoRestore-${V}-arm64.dmg"

      - name: Sign DMG with Sparkle EdDSA
        id: sparkle
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          V="${{ steps.ver.outputs.VERSION }}"
          curl -sSL -o sparkle.tar.xz "https://github.com/sparkle-project/Sparkle/releases/download/2.6.4/Sparkle-2.6.4.tar.xz"
          mkdir -p st && tar -xf sparkle.tar.xz -C st
          SIG=$(printf '%s' "$SPARKLE_PRIVATE_KEY" | ./st/bin/sign_update --ed-key-file - "PhotoRestore-${V}-arm64.dmg")
          echo "SIG_FRAGMENT=${SIG}" >> "$GITHUB_OUTPUT"

      - name: Create tag
        run: |
          git tag "${{ steps.ver.outputs.TAG }}"
          git push origin "${{ steps.ver.outputs.TAG }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.TAG }}
          name: Photo Restore ${{ steps.ver.outputs.VERSION }}
          body: ${{ steps.ver.outputs.CHANGELOG }}
          files: PhotoRestore-*.dmg

      - name: Update appcast
        env:
          SIG_FRAGMENT: ${{ steps.sparkle.outputs.SIG_FRAGMENT }}
          VERSION: ${{ steps.ver.outputs.VERSION }}
          TAG: ${{ steps.ver.outputs.TAG }}
          CHANGELOG: ${{ steps.ver.outputs.CHANGELOG }}
          REPO: ${{ github.repository }}
        run: |
          python3 .github/scripts/update_appcast.py \
            --appcast site/appcast.xml \
            --version "$VERSION" \
            --tag "$TAG" \
            --signature-fragment "$SIG_FRAGMENT" \
            --download-url "https://github.com/${REPO}/releases/download/${TAG}/PhotoRestore-${VERSION}-arm64.dmg" \
            --changelog "$CHANGELOG"

      - name: Commit + push appcast
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/appcast.xml
          if git diff --staged --quiet; then echo "no appcast change"; exit 0; fi
          git commit -m "chore(release): publish appcast for ${{ steps.ver.outputs.TAG }}"
          for attempt in 1 2 3; do
            if git pull --rebase origin main && git push origin HEAD:main; then exit 0; fi
            echo "push attempt ${attempt} failed; retrying"; sleep 5
          done
          echo "::error::failed to push appcast"; exit 1

  # Note: Pages is NOT deployed here. The appcast push above uses GITHUB_TOKEN, which by
  # design doesn't trigger other workflows — so Deploy Pages reacts to *this workflow
  # completing* via a workflow_run trigger (see deploy-pages.yml).
